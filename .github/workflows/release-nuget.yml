name: Release NuGet packages

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  pack-and-publish:
    name: Pack and publish
    runs-on: windows-latest

    env:
      PROJECT_PATHS: |
        src/ITfoxtec.Identity.Saml2/ITfoxtec.Identity.Saml2.csproj
        src/ITfoxtec.Identity.Saml2.Mvc/ITfoxtec.Identity.Saml2.Mvc.csproj
        src/ITfoxtec.Identity.Saml2.MvcCore/ITfoxtec.Identity.Saml2.MvcCore.csproj
      PACKAGE_OUTPUT: artifacts/packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate release version
        shell: pwsh
        run: |
          $projectPaths = $env:PROJECT_PATHS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $releaseVersion = "${{ github.event.release.tag_name }}"
          $isGitHubPrerelease = [System.Convert]::ToBoolean("${{ github.event.release.prerelease }}")

          foreach ($projectPath in $projectPaths) {
            [xml]$project = Get-Content $projectPath
            $properties = $project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1

            if (-not $properties) {
              throw "Could not find <Version> in $projectPath."
            }

            $componentVersion = $properties.Version
            $isNuGetPrerelease = $componentVersion -match "-"

            if ($releaseVersion -ne $componentVersion) {
              throw "GitHub release tag '$releaseVersion' does not match component version '$componentVersion' in $projectPath."
            }

            if ($isGitHubPrerelease -and -not $isNuGetPrerelease) {
              throw "GitHub release is marked as prerelease, but component version '$componentVersion' in $projectPath is a stable NuGet version. Use a prerelease suffix, e.g. '$componentVersion-beta.1'."
            }

            if (-not $isGitHubPrerelease -and $isNuGetPrerelease) {
              throw "GitHub release is not marked as prerelease, but component version '$componentVersion' in $projectPath is a NuGet prerelease version."
            }

            foreach ($propertyName in @("AssemblyVersion", "FileVersion")) {
              $propertyVersion = $properties.$propertyName
              if ($propertyVersion -and $propertyVersion -ne $componentVersion) {
                throw "<$propertyName> '$propertyVersion' in $projectPath does not match component version '$componentVersion'."
              }
            }

            "Release version '$releaseVersion' matches $projectPath."
          }

      - name: Restore
        run: dotnet restore ITfoxtec.Identity.Saml2.sln

      - name: Build packages
        shell: pwsh
        run: |
          $projectPaths = $env:PROJECT_PATHS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          foreach ($projectPath in $projectPaths) {
            dotnet build $projectPath --configuration Release --no-restore
          }

      - name: Test
        run: dotnet test UnitTest/ITfoxtec.Identity.Saml2.Tests/ITfoxtec.Identity.Saml2.Tests.csproj --configuration Release --no-restore --verbosity normal

      - name: Pack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:PACKAGE_OUTPUT | Out-Null
          $projectPaths = $env:PROJECT_PATHS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          foreach ($projectPath in $projectPaths) {
            dotnet pack $projectPath --configuration Release --no-build --output $env:PACKAGE_OUTPUT
          }

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem $env:PACKAGE_OUTPUT -Filter *.nupkg |
            ForEach-Object {
              dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --skip-duplicate
            }

          Get-ChildItem $env:PACKAGE_OUTPUT -Filter *.snupkg |
            ForEach-Object {
              dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --skip-duplicate
            }

      - name: Upload packages to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/packages/*
